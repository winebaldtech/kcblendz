<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <linearGradient id="cupG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCD34D"/>
      <stop offset=".5" stop-color="#F97316"/>
      <stop offset="1" stop-color="#E91E8C"/>
    </linearGradient>
    <linearGradient id="lidG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".85"/>
      <stop offset="1" stop-color="#cbd5e1" stop-opacity=".55"/>
    </linearGradient>
  </defs>
  <!-- dome lid -->
  <path d="M50 70 Q100 10 150 70 Z" fill="url(#lidG)" stroke="#0F0F0F" stroke-width="3"/>
  <ellipse cx="100" cy="70" rx="50" ry="6" fill="#e2e8f0" stroke="#0F0F0F" stroke-width="2"/>
  <!-- cup body -->
  <path d="M52 70 L60 220 Q60 232 72 232 L128 232 Q140 232 140 220 L148 70 Z"
        fill="url(#cupG)" stroke="#0F0F0F" stroke-width="3"/>
  <!-- highlight -->
  <path d="M58 80 L64 215" stroke="#ffffff" stroke-opacity=".35" stroke-width="3" stroke-linecap="round"/>
  <!-- label -->
  <circle cx="100" cy="150" r="34" fill="#ffffff" stroke="#0F0F0F" stroke-width="2.5"/>
  <text x="100" y="148" text-anchor="middle" font-family="Righteous, system-ui, sans-serif" font-size="14" fill="#16a34a">KC</text>
  <text x="100" y="166" text-anchor="middle" font-family="Righteous, system-ui, sans-serif" font-size="14" fill="#16a34a">Blendz</text>
  <!-- straw -->
  <rect x="94" y="20" width="10" height="60" fill="#E91E8C" stroke="#0F0F0F" stroke-width="2" rx="2"/>
</svg>
