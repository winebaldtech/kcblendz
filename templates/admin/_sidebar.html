{# Admin sidebar — uses `active` var #}
<aside class="admin-sidebar lg:w-64 lg:shrink-0 text-white lg:min-h-screen border-r-2 border-black">
  <div class="p-4 border-b-2 border-white/10">
    <a href="{{ url_for('admin_dashboard') }}" class="flex items-center gap-3">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="" class="w-9 h-9 rounded-full border-2 border-white object-cover">
      <div>
        <p class="brand text-lg leading-none">KCBlendz</p>
        <p class="text-[10px] uppercase tracking-widest text-[var(--lime)] font-bold">Admin Panel</p>
      </div>
    </a>
  </div>
  <nav class="p-3 space-y-0.5">
    <a href="{{ url_for('admin_dashboard') }}" class="admin-link {% if active == 'dashboard' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="{{ url_for('admin_products') }}" class="admin-link {% if active == 'products' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Products
    </a>
    <a href="{{ url_for('admin_categories') }}" class="admin-link {% if active == 'categories' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Categories
    </a>
    <a href="{{ url_for('admin_orders') }}" class="admin-link {% if active == 'orders' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11h6m-3-4v8m-7-9 1 13h12l1-13z"/></svg>
      Orders
    </a>
    <a href="{{ url_for('admin_users') }}" class="admin-link {% if active == 'users' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Customers
    </a>
    <a href="{{ url_for('admin_subscriptions') }}" class="admin-link {% if active == 'subscriptions' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      Subscriptions
    </a>
    <a href="{{ url_for('admin_builder') }}" class="admin-link {% if active == 'builder' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Builder Config
    </a>
    <a href="{{ url_for('admin_blogs') }}" class="admin-link {% if active == 'blogs' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10l6 6v8a2 2 0 0 1-2 2z"/><polyline points="14 2 14 8 20 8"/></svg>
      Wellness Hub
    </a>
    <a href="{{ url_for('admin_reports') }}" class="admin-link {% if active == 'reports' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Reports
    </a>
    <a href="{{ url_for('admin_promo') }}" class="admin-link {% if active == 'promo' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Promo Codes
    </a>
    <a href="{{ url_for('admin_refunds') }}" class="admin-link {% if active == 'refunds' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Refunds
    </a>
    <a href="{{ url_for('admin_faqs') }}" class="admin-link {% if active == 'faqs' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      FAQs
    </a>
    <a href="{{ url_for('admin_messages') }}" class="admin-link {% if active == 'messages' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </a>
    <a href="{{ url_for('admin_notifications') }}" class="admin-link {% if active == 'notifications' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Notifications
    </a>

    <div class="border-t border-white/10 my-3"></div>

    <a href="{{ url_for('admin_profile') }}" class="admin-link {% if active == 'profile' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      My Profile
    </a>
    <a href="{{ url_for('home') }}" class="admin-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      View store
    </a>
    <form action="{{ url_for('logout') }}" method="post">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
      <button type="submit" class="admin-link w-full text-rose-400">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </form>
  </nav>
</aside>
