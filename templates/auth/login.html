{% extends "base.html" %}
{% block title %}Sign in — KCBlendz{% endblock %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="KCBlendz" class="w-16 h-16 mx-auto rounded-full border-2 border-[var(--kc-dark)] object-cover mb-3 shadow-[3px_3px_0_var(--kc-yellow)]">
      <h1 class="brand text-4xl">Welcome back</h1>
      <p class="text-sm text-gray-600 mt-1">Sign in to continue your wellness journey.</p>
    </div>

    <form action="{{ url_for('login') }}" method="post" class="bg-white rounded-2xl border-2 border-[var(--kc-dark)] p-6 shadow-[6px_6px_0_var(--kc-orange)] space-y-4">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}">

      <div>
        <label class="label">Email</label>
        <input type="email" name="email" value="{{ email or '' }}" required autocomplete="email" class="input w-full">
      </div>

      <div>
        <label class="label flex items-center justify-between">
          <span>Password</span>
          <a href="{{ url_for('forgot_password') }}" class="text-[11px] normal-case tracking-normal text-[var(--kc-orange)] hover:underline">Forgot?</a>
        </label>
        <div class="relative">
          <input type="password" name="password" id="login_password" required autocomplete="current-password" class="input w-full pr-10">
          <button type="button" onclick="document.getElementById('login_password').type = document.getElementById('login_password').type === 'password' ? 'text' : 'password'" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-[var(--kc-dark)]" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
        <input type="checkbox" name="remember" class="w-4 h-4 accent-[var(--kc-green)]" checked>
        Keep me signed in
      </label>

      <button type="submit" class="btn-orange rounded-full w-full py-3 font-extrabold uppercase tracking-wider text-sm border-2 border-[var(--kc-dark)] shadow-[4px_4px_0_var(--kc-dark)] hover:translate-y-[-2px] hover:shadow-[6px_6px_0_var(--kc-dark)] transition">
        Sign in
      </button>
    </form>

    <p class="text-center text-sm mt-6 text-gray-600">
      New to KCBlendz? <a href="{{ url_for('register') }}" class="link">Create your account</a>
    </p>
  </div>
</section>
{% endblock %}
