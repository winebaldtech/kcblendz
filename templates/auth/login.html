{% extends "base.html" %}
{% block title %}Sign in — KCBlendz{% endblock %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="KCBlendz" class="w-16 h-16 mx-auto rounded-full border-2 border-[var(--kc-dark)] object-cover mb-3 shadow-[3px_3px_0_var(--kc-yellow)]">
      <h1 class="brand text-4xl">Welcome back</h1>
      <p class="text-sm text-gray-600 mt-1">Sign in to continue your wellness journey.</p>
    </div>

    <form action="{{ url_for('login') }}" method="post" class="bg-white rounded-2xl border-2 border-[var(--kc-dark)] p-6 shadow-[6px_6px_0_var(--kc-orange)] space-y-4">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}">

      <div>
        <label class="label">Email</label>
        <input type="email" name="email" value="{{ email or '' }}" required autocomplete="email" class="input w-full">
      </div>

      <div>
        <label class="label flex items-center justify-between">
          <span>Password</span>
          <a href="{{ url_for('forgot_password') }}" class="text-[11px] normal-case tracking-normal text-[var(--kc-orange)] hover:underline">Forgot?</a>
        </label>
        <div class="relative">
          <input type="password" name="password" id="login_password" required autocomplete="current-password" class="input w-full pr-11 kc-no-native-reveal">
          <button type="button" id="login_pw_toggle" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-[var(--kc-dark)]" aria-label="Show password">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
        <input type="checkbox" name="remember" class="w-4 h-4 accent-[var(--kc-green)]" checked>
        Keep me signed in
      </label>

      <button type="submit" class="btn-orange rounded-full w-full py-3 font-extrabold uppercase tracking-wider text-sm border-2 border-[var(--kc-dark)] shadow-[4px_4px_0_var(--kc-dark)] hover:translate-y-[-2px] hover:shadow-[6px_6px_0_var(--kc-dark)] transition">
        Sign in
      </button>
    </form>

    <p class="text-center text-sm mt-6 text-gray-600">
      New to KCBlendz? <a href="{{ url_for('register') }}" class="link">Create your account</a>
    </p>
  </div>
</section>
<script>
  (function(){
    var btn = document.getElementById('login_pw_toggle');
    var inp = document.getElementById('login_password');
    if (!btn || !inp) return;
    btn.addEventListener('click', function(){
      var show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.querySelector('.eye-open').classList.toggle('hidden', show);
      btn.querySelector('.eye-closed').classList.toggle('hidden', !show);
    });
  })();
</script>
{% endblock %}
