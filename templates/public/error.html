{% extends "base.html" %}
{% block title %}{{ code }} — {{ title }} — KCBlendz{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-4 py-20 text-center">
  <p class="brand text-[120px] md:text-[180px] leading-none text-[var(--fuchsia)] drop-shadow-[4px_4px_0_#0F0F0F]">{{ code }}</p>
  <h1 class="text-3xl md:text-4xl font-extrabold mb-3">{{ title }}</h1>
  <p class="text-gray-600 mb-8 max-w-md mx-auto">{{ msg }}</p>
  <div class="flex flex-wrap items-center justify-center gap-3">
    <a href="{{ url_for('home') if current_region() else url_for('store_select') }}" class="btn-fuchsia rounded-full px-6 py-3 font-extrabold uppercase tracking-wider text-sm border-2 border-black shadow-[4px_4px_0_#000]">
      Back home
    </a>
    <a href="{{ url_for('shop') }}" class="btn-outline-dark rounded-full px-6 py-3 font-extrabold uppercase tracking-wider text-sm border-2 border-black">
      Shop the menu
    </a>
  </div>
</section>
{% endblock %}
